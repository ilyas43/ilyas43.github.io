<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Name Portfolio</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif; /* A simple professional font */
      background-color: #011F4B;
      color: white; /* White text color */
    }

    .container {
      max-width: 1000px;
      margin: 0 auto; /* Center the container horizontally */
      padding: 20px;
    }

    .header {
      text-align: center;
      padding-bottom: 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.2); /* A subtle white separator line */
    }

    .title {
      font-size: 2em;
      margin-bottom: 5px;
    }

    .subtitle {
      font-size: 1.2em;
    }

    .content {
      padding-top: 20px;
    }

    .section {
      margin-bottom: 20px;
    }

    .section-title {
      font-size: 1.5em;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <h1 class="title">El jawhari Ilyas</h1>
      <p class="subtitle">Data engineer</p>
    </header>

    <div class="content">
      <section class="section">
        <h2 class="section-title">About Me</h2>
        <p>A short introduction about yourself and your skills.</p>
        <img src="./img/profil.jpg" alt="Your Name - Profile Picture">
      </section>

      <section class="section">
        <h2 class="section-title">Projects</h2>
        <p>List your projects here. You can include links and short descriptions.</p>
      </section>

      <section class="section">
        <h2 class="section-title">Skills</h2>
        <ul>
          <li>Skill 1</li>
          <li>Skill 2</li>
          <li>Skill 3</li>
        </ul>
      </section>

      <section class="section">
        <h2 class="section-title">Contact</h2>
        <p>Provide your contact information (email, social media links, etc.)</p>
      </section>
    </div>
  </div>
</body>
</html>
